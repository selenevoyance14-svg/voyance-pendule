<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <radialGradient id="candle-glow" cx="50%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#f0d060" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0a0518" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flame" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="40%" stop-color="#f39c12"/>
      <stop offset="100%" stop-color="#f1c40f"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="#0a0518"/>
  <circle cx="200" cy="120" r="120" fill="url(#candle-glow)"/>
  <!-- Candle body -->
  <rect x="188" y="150" width="24" height="80" rx="3" fill="#e8d5b7" opacity="0.8"/>
  <rect x="188" y="150" width="24" height="80" rx="3" fill="none" stroke="#d4af37" stroke-width="0.8" opacity="0.5"/>
  <!-- Wick -->
  <line x1="200" y1="150" x2="200" y2="135" stroke="#5a4a3a" stroke-width="1.5"/>
  <!-- Flame -->
  <ellipse cx="200" cy="115" rx="10" ry="22" fill="url(#flame)" opacity="0.9"/>
  <ellipse cx="200" cy="118" rx="5" ry="12" fill="#f1c40f" opacity="0.8"/>
  <!-- Wax drips -->
  <circle cx="193" cy="165" r="3" fill="#e8d5b7" opacity="0.6"/>
  <circle cx="208" cy="180" r="2.5" fill="#e8d5b7" opacity="0.5"/>
  <!-- Candle holder -->
  <ellipse cx="200" cy="232" rx="30" ry="6" fill="#d4af37" opacity="0.4"/>
  <rect x="185" y="226" width="30" height="8" rx="2" fill="#d4af37" opacity="0.5"/>
  <!-- Smoke wisps -->
  <path d="M200 93 Q205 80 198 70 Q192 60 200 48" fill="none" stroke="#c4a2ff" stroke-width="0.8" opacity="0.3"/>
  <!-- Small side candles -->
  <rect x="128" y="180" width="14" height="45" rx="2" fill="#e8d5b7" opacity="0.4"/>
  <ellipse cx="135" cy="170" rx="5" ry="12" fill="#f0d060" opacity="0.5"/>
  <rect x="258" y="180" width="14" height="45" rx="2" fill="#e8d5b7" opacity="0.4"/>
  <ellipse cx="265" cy="170" rx="5" ry="12" fill="#f0d060" opacity="0.5"/>
  <!-- Stars -->
  <circle cx="70" cy="45" r="1.5" fill="#f0d060" opacity="0.6"/>
  <circle cx="330" cy="55" r="2" fill="#c4a2ff" opacity="0.5"/>
  <circle cx="65" cy="250" r="1" fill="#f0d060" opacity="0.4"/>
  <circle cx="340" cy="245" r="1.5" fill="#c4a2ff" opacity="0.4"/>
</svg>