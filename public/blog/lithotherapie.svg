<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <radialGradient id="crystal-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8ec5fc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0a0518" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="amethyst" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0c3fc"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="rose-quartz" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbc2eb"/>
      <stop offset="100%" stop-color="#d63384"/>
    </linearGradient>
    <linearGradient id="citrine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d060"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="#0a0518"/>
  <circle cx="200" cy="150" r="130" fill="url(#crystal-glow)"/>
  <!-- Amethyst crystal (center) -->
  <polygon points="200,80 185,130 190,200 210,200 215,130" fill="url(#amethyst)" opacity="0.7"/>
  <polygon points="200,80 185,130 190,200 210,200 215,130" fill="none" stroke="#c4a2ff" stroke-width="1"/>
  <line x1="200" y1="80" x2="190" y2="200" stroke="#c4a2ff" stroke-width="0.5" opacity="0.4"/>
  <line x1="200" y1="80" x2="210" y2="200" stroke="#c4a2ff" stroke-width="0.5" opacity="0.4"/>
  <!-- Rose quartz (left) -->
  <polygon points="140,130 125,165 135,210 155,210 160,165" fill="url(#rose-quartz)" opacity="0.5"/>
  <polygon points="140,130 125,165 135,210 155,210 160,165" fill="none" stroke="#fbc2eb" stroke-width="0.8"/>
  <!-- Citrine (right) -->
  <polygon points="260,120 248,160 252,205 272,205 275,160" fill="url(#citrine)" opacity="0.5"/>
  <polygon points="260,120 248,160 252,205 272,205 275,160" fill="none" stroke="#f0d060" stroke-width="0.8"/>
  <!-- Small crystal fragments -->
  <polygon points="170,190 165,210 175,210" fill="#c4a2ff" opacity="0.3"/>
  <polygon points="235,185 230,208 240,208" fill="#8ec5fc" opacity="0.3"/>
  <!-- Glow effects -->
  <circle cx="200" cy="140" r="30" fill="#c4a2ff" opacity="0.08"/>
  <circle cx="140" cy="170" r="20" fill="#fbc2eb" opacity="0.06"/>
  <circle cx="260" cy="165" r="20" fill="#f0d060" opacity="0.06"/>
  <!-- Stars -->
  <circle cx="75" cy="50" r="1.5" fill="#c4a2ff" opacity="0.6"/>
  <circle cx="325" cy="60" r="2" fill="#f0d060" opacity="0.5"/>
  <circle cx="80" cy="250" r="1" fill="#fbc2eb" opacity="0.4"/>
  <circle cx="330" cy="240" r="1.5" fill="#c4a2ff" opacity="0.4"/>
</svg>