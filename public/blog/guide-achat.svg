<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <radialGradient id="gem-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c4a2ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0a0518" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gem-fill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0c3fc"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="#0a0518"/>
  <circle cx="200" cy="150" r="120" fill="url(#gem-glow)"/>
  <!-- Large gem -->
  <polygon points="200,90 160,140 175,190 225,190 240,140" fill="url(#gem-fill)" opacity="0.6"/>
  <polygon points="200,90 160,140 175,190 225,190 240,140" fill="none" stroke="#d4af37" stroke-width="1.5"/>
  <!-- Gem facets -->
  <line x1="200" y1="90" x2="175" y2="190" stroke="#d4af37" stroke-width="0.5" opacity="0.4"/>
  <line x1="200" y1="90" x2="225" y2="190" stroke="#d4af37" stroke-width="0.5" opacity="0.4"/>
  <line x1="160" y1="140" x2="240" y2="140" stroke="#d4af37" stroke-width="0.5" opacity="0.4"/>
  <line x1="200" y1="90" x2="200" y2="190" stroke="#d4af37" stroke-width="0.3" opacity="0.3"/>
  <!-- Small gems -->
  <polygon points="120,170 110,185 120,195 130,185" fill="#c4a2ff" opacity="0.4" stroke="#d4af37" stroke-width="0.8"/>
  <polygon points="285,160 275,175 285,185 295,175" fill="#c4a2ff" opacity="0.3" stroke="#d4af37" stroke-width="0.8"/>
  <!-- Sparkles -->
  <circle cx="200" cy="75" r="3" fill="#f0d060" opacity="0.6"/>
  <circle cx="145" cy="130" r="2" fill="#f0d060" opacity="0.4"/>
  <circle cx="255" cy="125" r="2" fill="#f0d060" opacity="0.4"/>
  <!-- Stars -->
  <circle cx="70" cy="50" r="1.5" fill="#c4a2ff" opacity="0.6"/>
  <circle cx="330" cy="65" r="2" fill="#d4af37" opacity="0.5"/>
  <circle cx="80" cy="245" r="1" fill="#c4a2ff" opacity="0.4"/>
  <circle cx="320" cy="235" r="1.5" fill="#d4af37" opacity="0.4"/>
</svg>