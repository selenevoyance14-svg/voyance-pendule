<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c4a2ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1a0a3e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pendulum" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="#0a0518"/>
  <circle cx="200" cy="150" r="120" fill="url(#glow)"/>
  <!-- Pendulum chain -->
  <line x1="200" y1="30" x2="200" y2="160" stroke="#d4af37" stroke-width="2" opacity="0.8"/>
  <!-- Pendulum crystal -->
  <polygon points="200,160 185,200 200,220 215,200" fill="url(#pendulum)"/>
  <polygon points="200,160 185,200 200,220 215,200" fill="none" stroke="#f0d060" stroke-width="1" opacity="0.5"/>
  <!-- Glow around crystal -->
  <circle cx="200" cy="190" r="40" fill="#c4a2ff" opacity="0.1"/>
  <circle cx="200" cy="190" r="25" fill="#c4a2ff" opacity="0.15"/>
  <!-- Stars -->
  <circle cx="80" cy="60" r="2" fill="#f0d060" opacity="0.8"/>
  <circle cx="320" cy="80" r="1.5" fill="#f0d060" opacity="0.6"/>
  <circle cx="110" cy="230" r="1.5" fill="#c4a2ff" opacity="0.7"/>
  <circle cx="300" cy="220" r="2" fill="#f0d060" opacity="0.5"/>
  <circle cx="150" cy="40" r="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="280" cy="50" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="60" cy="150" r="1.5" fill="#c4a2ff" opacity="0.4"/>
  <circle cx="340" cy="160" r="1" fill="#f0d060" opacity="0.6"/>
</svg>