<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <radialGradient id="aura" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#e0c3fc" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#8ec5fc" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0a0518" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lotus" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0c3fc"/>
      <stop offset="100%" stop-color="#9b59b6"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="#0a0518"/>
  <circle cx="200" cy="135" r="130" fill="url(#aura)"/>
  <!-- Lotus flower -->
  <!-- Center petals -->
  <ellipse cx="200" cy="170" rx="15" ry="40" fill="url(#lotus)" opacity="0.9"/>
  <ellipse cx="200" cy="170" rx="15" ry="40" fill="url(#lotus)" opacity="0.7" transform="rotate(30 200 170)"/>
  <ellipse cx="200" cy="170" rx="15" ry="40" fill="url(#lotus)" opacity="0.7" transform="rotate(-30 200 170)"/>
  <ellipse cx="200" cy="170" rx="15" ry="40" fill="url(#lotus)" opacity="0.5" transform="rotate(60 200 170)"/>
  <ellipse cx="200" cy="170" rx="15" ry="40" fill="url(#lotus)" opacity="0.5" transform="rotate(-60 200 170)"/>
  <!-- Outer petals -->
  <ellipse cx="200" cy="170" rx="12" ry="50" fill="#9b59b6" opacity="0.3" transform="rotate(45 200 170)"/>
  <ellipse cx="200" cy="170" rx="12" ry="50" fill="#9b59b6" opacity="0.3" transform="rotate(-45 200 170)"/>
  <ellipse cx="200" cy="170" rx="12" ry="50" fill="#9b59b6" opacity="0.3" transform="rotate(90 200 170)"/>
  <!-- Third eye -->
  <circle cx="200" cy="100" r="12" fill="none" stroke="#d4af37" stroke-width="1.5" opacity="0.7"/>
  <circle cx="200" cy="100" r="5" fill="#d4af37" opacity="0.8"/>
  <!-- Light rays -->
  <line x1="200" y1="80" x2="200" y2="65" stroke="#d4af37" stroke-width="1" opacity="0.4"/>
  <line x1="212" y1="84" x2="220" y2="72" stroke="#d4af37" stroke-width="1" opacity="0.3"/>
  <line x1="188" y1="84" x2="180" y2="72" stroke="#d4af37" stroke-width="1" opacity="0.3"/>
  <!-- Stars -->
  <circle cx="70" cy="50" r="1.5" fill="#e0c3fc" opacity="0.6"/>
  <circle cx="330" cy="70" r="2" fill="#d4af37" opacity="0.5"/>
  <circle cx="100" cy="250" r="1" fill="#e0c3fc" opacity="0.4"/>
  <circle cx="310" cy="240" r="1.5" fill="#d4af37" opacity="0.4"/>
  <circle cx="50" cy="140" r="1" fill="#ffffff" opacity="0.3"/>
  <circle cx="350" cy="130" r="1" fill="#ffffff" opacity="0.3"/>
</svg>